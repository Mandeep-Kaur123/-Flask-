<!DOCTYPE html>
<html>
<head>
    <title>Static Web Scrapping</title>
</head>
<body>

<h1>Static Web Scrapping</h1>

<h2>Scraped Quotes</h2>

{% for quote in quotes %}
<div class="quote-card">
    <h3>{{ quote.author }}</h3>
    <p>{{ quote.text }}</p>
</div>
{% endfor %}

</body>
</html>
